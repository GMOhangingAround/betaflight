name: Build Custom FC Firmware

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Betaflight 4.5.1
        run: git clone --branch 4.5.1 --depth 1 https://github.com/betaflight/betaflight.git .

      - name: Install correct ARM SDK
        run: make arm_sdk_install

      - name: Build
        # We use -U to remove the Blitz default baro and -D to force yours in
        run: |
          make IFLIGHT_BLITZ_F722 EXTRA_FLAGS="-UUSE_BARO_DPS310 -DUSE_BARO_BMP388 -DUSE_BARO_I2C_BMP388 -DUSE_I2C -DUSE_I2C_DEVICE_1"

      - name: Upload hex
        uses: actions/upload-artifact@v4
        with:
          name: betaflight_4.5.1_BLITZ_BMP388
          path: obj/*.hex
