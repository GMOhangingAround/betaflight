name: Build Custom FC Firmware
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Betaflight 4.5.1
        run: git clone --branch 4.5.1 --depth 1 https://github.com/betaflight/betaflight.git .
      - name: Find where DPS310 is defined
        run: |
          grep -r "DPS310" --include="*.h" -l || true
          grep -r "DPS310" --include="*.c" -l || true
          grep -r "DPS310" --include="*.config" -l || true
          ls src/main/target/IFLIGHT_BLITZ_F722/ 2>/dev/null || echo "No IFLIGHT_BLITZ_F722 dir"
          find . -path "*BLITZ*"
      - name: Install correct ARM SDK
        run: make arm_sdk_install
      - name: Build
        run: make TARGET=IFLIGHT_BLITZ_F722 EXTRA_FLAGS="-UUSE_BARO_DPS310 -DUSE_BARO_I2C_BMP388"
      - name: Upload hex
        uses: actions/upload-artifact@v4
        with:
          name: betaflight_4.5.1_BLITZ_BMP388
          path: obj/*.hex
